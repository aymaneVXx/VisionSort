name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:
    branches: ["main"]

jobs:
  cpu-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    env:
      DEMO_MODE: "1"
      YOLO_CONFIG_DIR: ${{ github.workspace }}/data/ultralytics

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Static import check
        run: python -m compileall -q visionsort tests

      - name: Unit and integration tests
        run: python -m pytest -q

      - name: Lightweight CPU end-to-end scenario
        if: matrix.python-version == '3.12'
        run: >-
          python -m visionsort.runtime.e2e
          --db data/runtime/ci-e2e.db
          --report data/runtime/reports/ci-e2e.json
          --max-frames 72

      - name: RuntimeSupervisor process end-to-end scenario
        if: matrix.python-version == '3.12'
        run: >-
          python -m visionsort.runtime.supervisor_e2e
          --db data/runtime/ci-supervisor-e2e.db
          --report data/runtime/reports/supervisor-e2e.json
          --max-frames 72

      - name: Upload E2E reports
        if: always() && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: visionsort-e2e-reports-py${{ matrix.python-version }}
          path: |
            data/runtime/reports/ci-e2e.json
            data/runtime/reports/supervisor-e2e.json
          if-no-files-found: warn
