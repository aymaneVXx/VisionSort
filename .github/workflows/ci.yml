name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:
    branches: ["main"]

jobs:
  cpu-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEMO_MODE: "1"
      YOLO_CONFIG_DIR: ${{ github.workspace }}/data/ultralytics

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Static import check
        run: python -m compileall -q visionsort tests

      - name: Unit and integration tests
        run: python -m pytest -q

      - name: Lightweight CPU end-to-end scenario
        run: >-
          python -m visionsort.runtime.e2e
          --db data/runtime/ci-e2e.db
          --report data/runtime/reports/ci-e2e.json
          --max-frames 72

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visionsort-e2e-report
          path: data/runtime/reports/ci-e2e.json
          if-no-files-found: warn
